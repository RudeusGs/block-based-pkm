# CẤU HÌNH REDIS CÓ PERSISTENCE (RDB + AOF)

# Thư mục lưu dữ liệu (file .rdb và .aof)
dir /data

# RDB SNAPSHOT (backup định kỳ)

# Lưu snapshot nếu:
# - 900 giây có ít nhất 1 thay đổi
# - 300 giây có ít nhất 10 thay đổi
# - 60 giây có ít nhất 10000 thay đổi
save 900 1
save 300 10
save 60 10000

# Tên file snapshot
dbfilename dump.rdb

# AOF (Append Only File - ghi log)

# Bật AOF để tăng độ an toàn dữ liệu
appendonly yes

# Tên file AOF
appendfilename "appendonly.aof"

# Chính sách fsync:
# everysec = mỗi giây ghi xuống disk (cân bằng giữa hiệu năng và an toàn)
appendfsync everysec

# Có dừng ghi khi đang rewrite AOF không?
no-appendfsync-on-rewrite no

# BẢO VỆ DỮ LIỆU

# Nếu lỗi khi lưu snapshot → dừng ghi để tránh mất dữ liệu
stop-writes-on-bgsave-error yes

# CẤU HÌNH DEV (tuỳ chọn)

# Tắt protected-mode nếu bạn bind ra toàn mạng (chỉ dùng khi dev)
# protected-mode no

# TỐI ƯU PERSISTENCE

# Nén file RDB để giảm dung lượng
rdbcompression yes

# Tối ưu cấp phát file (giảm phân mảnh disk)
fallocate-enabled yes

# LOG

# Mức log (debug | verbose | notice | warning)
loglevel notice

# Xuất log ra stdout (dùng tốt cho Docker)
logfile ""